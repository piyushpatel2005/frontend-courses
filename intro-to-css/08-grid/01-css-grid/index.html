<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Grid</title>
  <style>
    .grid {
      /* Add grid rules */
    }

    .cell {
      background: #e2e8f0;
      padding: 12px;
    }
  </style>
</head>
<body>

    <div class="cell">1</div>

    <div class="cell">4</div>
  </section>
</body>
</html>
