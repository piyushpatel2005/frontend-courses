<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Positioning</title>
  <style>
    .container {
      width: 240px;
      height: 120px;
      border: 1px solid #cbd5e1;
    }

    .badge {
      background: #2563eb;
      color: white;
      padding: 4px 8px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Hot</span>
  </div>
</body>
</html>
