<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flexbox Items</title>
  <style>
    .layout {
      gap: 12px;
      /* Add display flex */
    }

    .main,
    .aside {
      background: #e2e8f0;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="main">Main</section>
    <aside class="aside">Aside</aside>
  </div>
</body>
</html>
