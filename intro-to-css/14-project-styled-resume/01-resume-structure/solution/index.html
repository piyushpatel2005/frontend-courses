<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Styled Resume Project</title>
  <style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --space: 16px;
    }

    .resume-header h1 {
      font-size: 32px;
      margin: 0 0 8px;
    }

    .resume-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space);
    }
  </style>
</head>
<body>
  <main class="resume">
    <header class="resume-header">
      <h1>Alex Doe</h1>
      <p>Frontend Developer</p>
    </header>
    <div class="resume-layout">
      <section class="summary">Summary</section>
      <section class="skills">Skills</section>
      <section class="experience">Experience</section>
      <section class="contact">Contact</section>
    </div>
  </main>
</body>
</html>
