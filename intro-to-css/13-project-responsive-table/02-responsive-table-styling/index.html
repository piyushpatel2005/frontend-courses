<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Responsive Table Project</title>
  <style>
    th {
      background: #e2e8f0;
    }

    /* Add overflow, cell styles, and media query */
  </style>
</head>
<body>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>City</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Ana</td><td>Dev</td><td>Toronto</td><td>Active</td></tr>
        <tr><td>Ben</td><td>Design</td><td>Vancouver</td><td>Active</td></tr>
        <tr><td>Cam</td><td>PM</td><td>Montreal</td><td>Away</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
