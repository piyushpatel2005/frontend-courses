<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Animation Project</title>
  <style>
    .cta-btn {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: #ef4444;
      color: white;
      border-radius: 999px;
      font-size: 14px;
      /* Add keyframes and animation */
    }

    /* Define @keyframes pulse */
  </style>
</head>
<body>
  <button class="cta-btn">Get Started</button>
  <span class="badge">3</span>
</body>
</html>
