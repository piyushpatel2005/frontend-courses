<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dropdown Menu Project</title>
  <style>
    .dropdown {
      position: relative;
    }
  </style>
</head>
<body>
  <nav>
    <div class="dropdown">
      <button class="dropdown-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
        <a href="#">Link 3</a>
      </div>
    </div>
  </nav>
</body>
</html>
