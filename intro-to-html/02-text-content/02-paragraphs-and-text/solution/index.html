<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Paragraphs Exercise</title>
</head>
<body>
  <h1>The Art of Slow Travel</h1>
  <p>
    Slow travel means spending more time in <em>fewer places</em> rather than rushing through dozens of cities.<br>
    It is a mindset shift that transforms a holiday into an experience.
  </p>
  <hr>
  <p>The most <strong>important</strong> thing slow travellers carry is curiosity — not an itinerary.</p>
</body>
</html>
