<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Input Types Exercise</title>
</head>
<body>
  <h1>Input Types</h1>
  <form>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="jsmith" />

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" />

    <label for="age">Age</label>
    <input type="number" id="age" name="age" min="1" max="120" step="1" />

    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" name="dob" />

    <label for="fav-color">Favourite Colour</label>
    <input type="color" id="fav-color" name="fav-color" value="#336699" />

    <button type="submit">Submit</button>
  </form>
</body>
</html>
