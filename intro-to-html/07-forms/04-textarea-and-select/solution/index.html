<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Textarea and Select</title>
</head>
<body>
  <h1>Profile Setup</h1>
  <form>
    <label for="bio">Bio</label>
    <textarea id="bio" name="bio" rows="5" cols="50" placeholder="Tell us about yourself..."></textarea>

    <label for="language">Favourite Language</label>
    <select id="language" name="language">
      <option value="">-- Choose --</option>
      <option value="html" selected>HTML</option>
      <option value="css">CSS</option>
      <option value="js">JavaScript</option>
      <option value="python">Python</option>
    </select>

    <label for="city">City</label>
    <input list="cities" id="city" name="city" placeholder="Start typing..." />
    <datalist id="cities">
      <option value="London">
      <option value="New York">
      <option value="Tokyo">
      <option value="Sydney">
    </datalist>

    <button type="submit">Save Profile</button>
  </form>
</body>
</html>
