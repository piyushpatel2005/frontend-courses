<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tables Exercise</title>
</head>
<body>
  <h1>Weekly Schedule</h1>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>9:00 AM</td>
        <td>HTML</td>
        <td>CSS</td>
        <td>JavaScript</td>
        <td>HTML</td>
        <td>CSS</td>
      </tr>
      <tr>
        <td>11:00 AM</td>
        <td colspan="5">Open Lab — Work on your project</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
