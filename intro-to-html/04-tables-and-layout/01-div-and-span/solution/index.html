<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Div and Span Exercise</title>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Card One</h2>
      <p>This card uses a <span class="highlight">block container</span> to group its content.</p>
    </div>
    <div class="card">
      <h2>Card Two</h2>
      <p>Divs are invisible by default — CSS gives them appearance and layout.</p>
    </div>
  </div>
</body>
</html>
