<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Visiting Card</title>
</head>
<body>
  <div class="card">
    <div class="profile">
      <h1>Riya Patel</h1>
      <p>Frontend Developer</p>
      <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300" alt="Portrait of Riya Patel" width="160" />
    </div>

    <div class="contact">
      <h2>Contact</h2>
      <ul>
        <li><span>Email:</span> <span>riya@example.com</span></li>
        <li><span>Phone:</span> <span>+1 555 0142</span></li>
        <li><span>City:</span> <span>Toronto</span></li>
      </ul>
    </div>
  </div>
</body>
</html>
