<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hyperlinks Exercise</title>
</head>
<body>
  <h1>My Links Page</h1>

  <nav>
    <a href="https://www.wikipedia.org" target="_blank" rel="noopener noreferrer">Wikipedia</a>
    <a href="#about">About this page</a>
  </nav>

  <section id="about">
    <h2>About This Page</h2>
    <p>This page demonstrates how to use HTML hyperlinks — both external links and internal anchor links.</p>
  </section>
</body>
</html>
